<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout | Fashion Shop</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
      .checkout-container {
        max-width: 900px;
        margin: 50px auto;
        background: white;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 40px;
      }

      .payment-section {
        text-align: center;
        border-right: 1px solid #eee;
        padding-right: 40px;
      }

      /* 🔥 Tab Style 🔥 */
      .payment-tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 25px;
        justify-content: center;
      }
      .tab-btn {
        padding: 10px 15px;
        border: 1px solid #ddd;
        background: #f8f9fa;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: 0.3s;
        flex: 1;
      }
      .tab-btn.active {
        background: #2c3e50;
        color: white;
        border-color: #2c3e50;
      }

      .qr-box {
        background: #f8f9fa;
        padding: 20px;
        border-radius: 10px;
        margin: 10px 0;
        display: inline-block;
        border: 2px dashed #d35400;
      }
      .qr-box img {
        width: 200px;
        height: 200px;
        display: block;
      }

      /* 🔥 Credit Card Form Style 🔥 */
      #card-form {
        text-align: left;
        background: #f8f9fa;
        padding: 20px;
        border-radius: 12px;
        border: 1px solid #eee;
      }
      .form-group {
        margin-bottom: 15px;
      }
      .form-group label {
        display: block;
        font-size: 0.85rem;
        margin-bottom: 5px;
        font-weight: 600;
      }
      .form-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        box-sizing: border-box;
      }

      .order-summary h3 {
        border-bottom: 2px solid #2c3e50;
        padding-bottom: 10px;
        margin-bottom: 20px;
      }
      .order-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 1px solid #f0f0f0;
      }
      .item-info {
        flex: 1;
      }
      .item-name {
        font-weight: bold;
        color: #333;
        display: block;
      }
      .item-price {
        color: #777;
        font-size: 0.9rem;
      }
      .item-controls {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .qty-btn {
        background: #eee;
        border: none;
        width: 30px;
        height: 30px;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
      }
      .remove-btn {
        background: #ffcccc;
        color: #c0392b;
        border: none;
        width: 30px;
        height: 30px;
        border-radius: 5px;
        cursor: pointer;
      }
      .total-price {
        font-size: 1.5rem;
        font-weight: bold;
        color: #d35400;
        margin-top: 20px;
        border-top: 2px solid #eee;
        padding-top: 15px;
        display: flex;
        justify-content: space-between;
      }
      .status-badge {
        margin-top: 10px;
        padding: 8px 15px;
        background: #fff3cd;
        color: #856404;
        border-radius: 20px;
        font-weight: bold;
        display: inline-block;
      }

      @media (max-width: 768px) {
        .checkout-container {
          grid-template-columns: 1fr;
        }
        .payment-section {
          border-right: none;
          border-bottom: 1px solid #eee;
          padding-bottom: 30px;
          padding-right: 0;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">Fashion Shop</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
      </ul>
    </nav>

    <div class="checkout-container">
      <div class="payment-section">
        <h2><i class="fas fa-wallet"></i> Payment Method</h2>

        <div class="payment-tabs">
          <button class="tab-btn active" onclick="switchTab('qr')">
            <i class="fas fa-qrcode"></i> QR Scan
          </button>
          <button class="tab-btn" onclick="switchTab('card')">
            <i class="fas fa-credit-card"></i> Credit Card
          </button>
        </div>

        <div id="qr-section">
          <div class="qr-box" id="qr-container">
            <img id="qr-img" src="" alt="Generating QR..." />
          </div>
          <a
            id="btn-deeplink"
            href="#"
            style="
              display: block;
              background: #00aee0;
              color: white;
              padding: 15px;
              text-decoration: none;
              border-radius: 10px;
              font-weight: bold;
              margin-top: 15px;
            "
          >
            <i class="fas fa-mobile-alt"></i> PAY WITH U-PAY APP
          </a>
        </div>

        <div id="card-section" style="display: none">
          <div id="card-form">
            <div class="form-group">
              <label>Card Number</label>
              <input
                type="text"
                id="card-num"
                placeholder="1234 5678 9012 3456"
                maxlength="19"
              />
            </div>
            <div style="display: flex; gap: 10px">
              <div class="form-group" style="flex: 2">
                <label>Expiry Date</label>
                <input
                  type="text"
                  id="card-exp"
                  placeholder="MM/YY"
                  maxlength="5"
                />
              </div>
              <div class="form-group" style="flex: 1">
                <label>CVV</label>
                <input
                  type="password"
                  id="card-cvv"
                  placeholder="***"
                  maxlength="3"
                />
              </div>
            </div>
            <button
              onclick="processCardPayment()"
              style="
                width: 100%;
                background: #004d40;
                color: white;
                padding: 15px;
                border: none;
                border-radius: 10px;
                font-weight: bold;
                cursor: pointer;
              "
            >
              CONFIRM PAYMENT
            </button>
          </div>
        </div>

        <div id="payment-status" style="margin-top: 20px">
          <span class="status-badge"
            ><i class="fas fa-spinner fa-spin"></i> Waiting for payment...</span
          >
        </div>
      </div>

      <div class="order-summary">
        <h3>Your Order</h3>
        <div id="order-items"></div>
        <div class="total-price">
          <span>Total:</span>
          <span id="total-amount">$0.00</span>
        </div>
        <div style="margin-top: 20px; font-size: 0.9rem; color: #777">
          <p>Order ID: <span id="display-order-id">...</span></p>
        </div>
      </div>
    </div>

    <script>
      const API_URL = "https://my-fashion-shop-t7vc.onrender.com/api";
      const UPAY_API_URL = "https://u-pay-bank.onrender.com/api/users";
      const FASHION_SHOP_ACC = "100000004"; // គណនី U-Pay របស់ Fashion Shop

      let currentOrderId = "";
      let currentTotal = 0;
      let pollingInterval;
      let dbProducts = [];
      let initialTrxCount = 0;

      window.onload = async function () {
        currentOrderId = "ORD-" + Math.floor(100000 + Math.random() * 900000);
        document.getElementById("display-order-id").innerText = currentOrderId;
        localStorage.setItem("pendingOrder", currentOrderId);

        try {
          const res = await fetch(`${API_URL}/products`);
          dbProducts = await res.json();
        } catch (error) {
          console.error("Error loading products:", error);
        }

        document
          .getElementById("card-num")
          .addEventListener("input", function (e) {
            e.target.value = e.target.value
              .replace(/[^\d]/g, "")
              .replace(/(.{4})/g, "$1 ")
              .trim();
          });

        document
          .getElementById("card-exp")
          .addEventListener("input", function (e) {
            e.target.value = e.target.value
              .replace(/[^\d]/g, "")
              .replace(/(.{2})/, "$1/")
              .trim();
          });

        renderOrderList();

        // ហៅមុខងារចាប់ API ថ្មីជំនួស startPolling ចាស់
        initUPayListener();
      };

      function switchTab(type) {
        document
          .querySelectorAll(".tab-btn")
          .forEach((b) => b.classList.remove("active"));
        event.currentTarget.classList.add("active");
        if (type === "qr") {
          document.getElementById("qr-section").style.display = "block";
          document.getElementById("card-section").style.display = "none";
        } else {
          document.getElementById("qr-section").style.display = "none";
          document.getElementById("card-section").style.display = "block";
        }
      }

      async function registerOrderToServer() {
        const cart = JSON.parse(localStorage.getItem("shoppingCart")) || [];
        const user = localStorage.getItem("username") || "អតិថិជនទូទៅ";
        const itemsString = cart
          .map((item, index) => `   ${index + 1}. ${item.name} (x${item.qty})`)
          .join("\n");

        await fetch(`${API_URL}/create-order`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            orderId: currentOrderId,
            cart: cart,
            user: user,
            itemsString: itemsString,
            amount: currentTotal.toFixed(2),
          }),
        });
      }

      function renderOrderList() {
        const cart = JSON.parse(localStorage.getItem("shoppingCart")) || [];
        const itemsContainer = document.getElementById("order-items");
        if (cart.length === 0) {
          window.location.href = "index.html";
          return;
        }

        currentTotal = cart.reduce(
          (sum, item) => sum + item.price * item.qty,
          0,
        );
        document.getElementById("total-amount").innerText =
          "$" + currentTotal.toFixed(2);

        itemsContainer.innerHTML = cart
          .map(
            (item, index) => `
            <div class="order-item">
                <div class="item-info">
                    <span class="item-name">${item.name}</span>
                    <span class="item-price">$${item.price} x ${item.qty}</span>
                </div>
                <div class="item-controls">
                    <button class="qty-btn" onclick="updateQty(${index}, -1)">-</button>
                    <span style="font-weight:bold; min-width:20px; text-align:center;">${item.qty}</span>
                    <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
                    <button class="remove-btn" onclick="removeItem(${index})"><i class="fas fa-trash"></i></button>
                </div>
            </div>`,
          )
          .join("");

        generateQRCode();
        registerOrderToServer();
      }

      function updateQty(index, change) {
        let cart = JSON.parse(localStorage.getItem("shoppingCart")) || [];
        if (cart[index]) {
          if (change > 0 && dbProducts.length > 0) {
            const product = dbProducts.find((p) => p.name === cart[index].name);
            if (cart[index].qty + change > (product?.stock || 0)) {
              alert("Out of stock!");
              return;
            }
          }
          cart[index].qty += change;
          if (cart[index].qty <= 0) cart.splice(index, 1);
        }
        localStorage.setItem("shoppingCart", JSON.stringify(cart));
        renderOrderList();
      }

      function removeItem(index) {
        let cart = JSON.parse(localStorage.getItem("shoppingCart")) || [];
        cart.splice(index, 1);
        localStorage.setItem("shoppingCart", JSON.stringify(cart));
        renderOrderList();
      }

      function generateQRCode() {
        const user = localStorage.getItem("username") || "អតិថិជនទូទៅ";
        const itemsString = (
          JSON.parse(localStorage.getItem("shoppingCart")) || []
        )
          .map((item, i) => `${i + 1}.${item.name}(x${item.qty})`)
          .join("\n");
        const callbackUrl = `${API_URL}/pay-confirm`;

        const amount = currentTotal.toFixed(2);

        // 1. បង្កើត QR ខ្លី ដើម្បីកាមេរ៉ាស្កេនបានលឿន
        const shortQrData = `${FASHION_SHOP_ACC}:${amount}:${currentOrderId}`;

        // 2. បង្កើត Link វែងសម្រាប់ប៊ូតុង PAY WITH U-PAY APP
        const paymentParams = `?acc=${FASHION_SHOP_ACC}&amount=${amount}&source=qr&lockAmount=true&orderId=${currentOrderId}&user=${encodeURIComponent(user)}&items=${encodeURIComponent(itemsString)}&callback=${encodeURIComponent(callbackUrl)}`;
        const transferUrl =
          `https://u-pay-bank.onrender.com/transfer.html` + paymentParams;

        document.getElementById("qr-img").src =
          `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(shortQrData)}&color=d35400`;
        document.getElementById("btn-deeplink").href = transferUrl;
      }

      // ==========================================
      // 🔥 SMART API POLLING (ឆែកលុយផ្ទាល់ពី U-Pay)
      // ==========================================
      async function initUPayListener() {
        try {
          const res = await fetch(UPAY_API_URL);
          const users = await res.json();
          const shopAcc = users.find(
            (u) => u.accountNumber === FASHION_SHOP_ACC,
          );

          if (shopAcc && shopAcc.transactions) {
            initialTrxCount = shopAcc.transactions.length; // កត់ត្រាចំនួន Transaction ចាស់
          }

          if (pollingInterval) clearInterval(pollingInterval);
          pollingInterval = setInterval(checkUPayPayment, 3000); // ឆែករៀងរាល់ 3 វិនាទី
        } catch (e) {
          console.log("Init Polling Error:", e);
        }
      }

      async function checkUPayPayment() {
        try {
          const res = await fetch(UPAY_API_URL);
          const users = await res.json();
          const shopAcc = users.find(
            (u) => u.accountNumber === FASHION_SHOP_ACC,
          );

          if (
            shopAcc &&
            shopAcc.transactions &&
            shopAcc.transactions.length > initialTrxCount
          ) {
            const latestTrx = shopAcc.transactions[0];

            if (latestTrx.amount > 0) {
              // មានអ្នកបាញ់លុយចូល
              clearInterval(pollingInterval); // ឈប់ឆែក

              // ប្រាប់ Backend របស់ Fashion Shop ឱ្យដឹងថាមានអ្នកបង់លុយហើយ
              await fetch(`${API_URL}/pay-confirm`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  orderId: currentOrderId,
                  amount: currentTotal.toFixed(2),
                  user: localStorage.getItem("username") || "QR User",
                  status: "SUCCESS",
                }),
              });

              // ដូរ UI ទៅជា Paid
              document.getElementById("payment-status").innerHTML =
                `<span class="status-badge" style="background:#d4edda; color:#155724;">Paid Successfully</span>`;

              Swal.fire({
                icon: "success",
                title: "Payment Successful!",
                text: "ការទូទាត់ជោគជ័យ។ សូមអរគុណសម្រាប់ការទិញទំនិញ!",
                timer: 3000,
                showConfirmButton: false,
              }).then(() => {
                localStorage.setItem("shoppingCart", "[]");
                localStorage.removeItem("pendingOrder");
                window.location.href = "index.html"; // លុប /fashion-shop/ ចេញ
              });
            } else {
              initialTrxCount = shopAcc.transactions.length;
            }
          }
        } catch (e) {
          console.log("Polling Error:", e);
        }
      }

      // ==========================================
      // 🔥 មុខងារទូទាត់តាមកាត (CREDIT CARD PAYMENT)
      // ==========================================
      async function processCardPayment() {
        const cardNum = document
          .getElementById("card-num")
          .value.replace(/\s/g, "");
        const cardExp = document.getElementById("card-exp").value;
        const cardCvv = document.getElementById("card-cvv").value;

        if (cardNum.length < 16 || cardExp.length < 5 || cardCvv.length < 3) {
          return Swal.fire(
            "Warning",
            "សូមបំពេញព័ត៌មានកាតឱ្យបានត្រឹមត្រូវ!",
            "warning",
          );
        }

        Swal.fire({
          title: "Processing...",
          text: "កំពុងផ្ញើសំណើទៅកាន់ U-Pay App...",
          allowOutsideClick: false,
          didOpen: () => Swal.showLoading(),
        });

        try {
          const res = await fetch(
            "https://u-pay-bank.onrender.com/api/card/request-payment",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                cardNumber: cardNum,
                expiry: cardExp,
                cvv: cardCvv,
                amount: currentTotal.toFixed(2),
                orderId: currentOrderId,
                shopName: "Fashion Shop",
              }),
            },
          );

          const data = await res.json();

          if (data.success) {
            Swal.fire({
              icon: "info",
              title: "Awaiting Approval",
              text: "សូមចូលទៅកាន់ U-Pay App របស់អ្នក ដើម្បីបញ្ជាក់ (Confirm) ការបង់ប្រាក់នេះ!",
              allowOutsideClick: false,
              showConfirmButton: false,
            });
            checkCardPaymentStatus(data.paymentId);
          } else {
            Swal.fire("Error", data.message || "ប្រតិបត្តិការបរាជ័យ", "error");
          }
        } catch (error) {
          Swal.fire("Error", "មិនអាចភ្ជាប់ទៅកាន់ U-Pay Server បានទេ!", "error");
        }
      }

      function checkCardPaymentStatus(paymentId) {
        const cardInterval = setInterval(async () => {
          try {
            const res = await fetch(
              `https://u-pay-bank.onrender.com/api/card/check-status/${paymentId}`,
            );
            const data = await res.json();

            if (data.status === "success") {
              clearInterval(cardInterval);

              await fetch(`${API_URL}/pay-confirm`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  orderId: currentOrderId,
                  amount: currentTotal.toFixed(2),
                  user: localStorage.getItem("username") || "Card User",
                  status: "SUCCESS",
                }),
              });

              Swal.fire({
                icon: "success",
                title: "Payment Successful!",
                text: "ការទូទាត់តាមកាតត្រូវបានសម្រេច។ សូមអរគុណ!",
                timer: 3000,
              }).then(() => {
                localStorage.setItem("shoppingCart", "[]");
                window.location.href = "index.html"; // លុប /fashion-shop/ ចេញ
              });
            } else if (data.status === "declined") {
              clearInterval(cardInterval);
              Swal.fire({
                icon: "error",
                title: "Payment Declined ❌",
                text: "អតិថិជនបានបដិសេធការទូទាត់ប្រាក់នេះ!",
                confirmButtonColor: "#ef4444",
              });
            } else if (data.status === "expired") {
              clearInterval(cardInterval);
              Swal.fire("Expired", "សំណើបង់ប្រាក់បានផុតកំណត់!", "error");
            }
          } catch (e) {
            console.log("Polling error...");
          }
        }, 3000);
      }
    </script>
  </body>
</html>
